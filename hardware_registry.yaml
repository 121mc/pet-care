devices:
  # 智能灯 - 通过 HTTP 控制，用于 soft_light 动作（安抚宠物）
  - id: smart-light-01
    name: 客厅智能灯
    enabled: true
    protocol: http
    capabilities:
      - light_signal
    host: "192.168.1.100"
    port: 8080
    commands:
      soft_light: "/api/light/soft"
    max_intensity: low
    max_action_duration_seconds: 20

  # 智能音箱 - 通过 HTTP 控制，用于 soothing_voice 动作（播放安抚声音）
  - id: smart-speaker-01
    name: 卧室智能音箱
    enabled: true
    protocol: http
    capabilities:
      - audio_playback
    host: "192.168.1.101"
    port: 8080
    commands:
      soothing_voice: "/api/speaker/soothing"
    max_intensity: low
    max_action_duration_seconds: 20

  # 自动逗猫玩具 - 通过串口控制，用于 short_play 动作
  - id: esp32-toy-01
    name: 自动逗猫棒
    enabled: false
    protocol: serial
    capabilities:
      - short_play
    port: COM3
    baudrate: 115200
    commands:
      short_play: PLAY_SHORT
    max_intensity: medium
    max_action_duration_seconds: 15

  # 通知模块 - 用于 notify_owner 动作（向主人发送通知）
  - id: notify-module-01
    name: 主人通知推送
    enabled: true
    protocol: http
    capabilities:
      - notify_owner
    host: "192.168.1.102"
    port: 8080
    commands:
      notify_owner: "/api/notify/owner"
