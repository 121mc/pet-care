video_acquisition:
  default_camera_index: 0
  default_duration_seconds: 20
  default_fps: 15
  output_dir: runs/latest/acquisition

data_processing:
  frame_interval_seconds: 1.0
  max_frames: 30
  output_dir: runs/latest/processed_frames
  blur_kernel_size: 61
  fallback_pet_box: center
  min_pet_box_area_ratio: 0.03

state_assessment:
  minimum_confidence_for_interaction: 0.65
  output_json: runs/latest/state_result.json
  allowed_states:
    - calm
    - resting
    - bored
    - anxious
    - alert
    - unknown

remote_interaction:
  allow_hardware_by_default: false
  dry_run_by_default: true
  log_path: runs/latest/interaction_log.json
  global_cooldown_seconds: 120

privacy:
  blur_non_pet_regions: true
  discard_low_confidence_frames: false
  keep_original_video_local_only: true
  share_processed_frames_only: true
